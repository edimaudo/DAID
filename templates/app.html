{% extends "base.html" %}

{% block head %}
<script src="https://unpkg.com/lucide@latest"></script>
<style>
    /* ... (Keep your exact existing CSS variables and classes here) ... */
</style>
<script>
    const __app_id = `{{ app_id }}`;
</script>
{% endblock %}

{% block content %}
<div class="max-w-6xl mx-auto px-6 py-12">
    <div class="mb-8 bg-blue-50 border border-blue-200 rounded-2xl p-6">
        <h3 class="text-sm font-bold text-blue-900 uppercase tracking-wider mb-2">Validated Problem Statement</h3>
        <p id="displayProblem" class="text-blue-800 font-medium"></p>
    </div>

    <div id="step-content" class="bg-white rounded-3xl p-8 min-h-[500px] shadow-sm border border-gray-100">
        </div>
    
    <div class="mt-8 flex justify-end items-center">
        <button id="generateBtn" onclick="runAgentTwo()" class="bg-blue-600 text-white px-8 py-3 rounded-xl font-bold hover:bg-blue-700 hidden">
            Generate Strategic Memo
        </button>
    </div>

    <div id="result-content" class="mt-8 bg-white rounded-3xl p-8 shadow-sm border border-gray-100 hidden prose max-w-none">
    </div>
</div>

<script>
    // Keep your exact FRAMEWORKS array here
    const FRAMEWORKS = [ /* ... your 72 frameworks ... */ ];

    window.appState = {
        selectedFrameworks: [],
        cleanProblem: ''
    };

    // On Load: Grab the problem from Framer
    document.addEventListener("DOMContentLoaded", () => {
        const problem = localStorage.getItem('daid_clean_problem');
        if (!problem) {
            window.location.href = "/framer"; // Kick them back if they skipped Step 1
            return;
        }
        window.appState.cleanProblem = problem;
        document.getElementById('displayProblem').innerText = problem;
        
        document.getElementById('step-content').appendChild(renderStep2());
    });

    // Keep your exact renderStep2 and toggleFramework functions
    function renderStep2() {
        const div = document.createElement('div');
        div.id = 'framework-grid-container';
        div.className = 'space-y-6 animate-in fade-in duration-500';
        div.innerHTML = `
            <div>
                <h2 class="text-3xl font-bold font-inter text-gray-900">Select Decision Framework</h2>
                <p class="text-gray-500">Choose a framework to guide the AI analysis.</p>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 max-h-[500px] overflow-y-auto pr-2 custom-scrollbar">
                ${FRAMEWORKS.map(f => `
                    <div onclick="toggleFramework('${f.id}')" 
                         class="card-elevate ${window.appState.selectedFrameworks.includes(f.id) ? 'selected-framework' : ''}">
                        <h4 class="font-bold text-gray-900 mb-1">${f.name}</h4>
                        <p class="text-xs text-gray-500 leading-relaxed">${f.desc}</p>
                    </div>
                `).join('')}
            </div>
        `;
        return div;
    }

    function toggleFramework(id) {
        // Enforce single selection for cleaner Agent 2 prompting, or keep array if you want multi-framework
        window.appState.selectedFrameworks = [id]; 
        
        // Re-render
        document.getElementById('framework-grid-container').replaceWith(renderStep2());
        
        // Show Generate Button
        document.getElementById('generateBtn').classList.remove('hidden');
    }

    // New API Call to Agent 2
    async function runAgentTwo() {
        const btn = document.getElementById('generateBtn');
        btn.innerText = "Generating Memo...";
        btn.disabled = true;

        try {
            const response = await fetch('/api/design_solution', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    cleanProblem: window.appState.cleanProblem,
                    frameworkId: window.appState.selectedFrameworks[0] 
                })
            });
            const data = await response.json();
            
            if(data.success) {
                const resDiv = document.getElementById('result-content');
                resDiv.classList.remove('hidden');
                // Normally you would parse Markdown here, but we will just insert text for structure validation
                resDiv.innerText = data.analysisData; 
                document.getElementById('step-content').classList.add('hidden');
                btn.classList.add('hidden');
            } else {
                alert("Error generating solution.");
            }
        } catch (error) {
            console.error(error);
            alert("Connection error.");
        } finally {
            btn.innerText = "Generate Strategic Memo";
            btn.disabled = false;
        }
    }
</script>
{% endblock %}
