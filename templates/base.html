<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAID - Decision Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; }</style>
    {% block head %}{% endblock %}
</head>
<body class="bg-slate-50 flex flex-col min-h-screen">
    <nav class="border-b bg-white sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between">
            <a href="/" class="text-xl font-bold text-blue-600">DAID</a>
            <div class="space-x-6 text-sm font-medium text-gray-600">
                <a href="/decision-information" class="hover:text-blue-600">Approaches</a>
                <a href="/framer" class="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 transition-colors">Launch App</a>
            </div>
        </div>
    </nav>

    <main class="flex-grow">
        {% block content %}{% endblock %}
    </main>

    <footer class="bg-white border-t py-12">
        <div class="max-w-7xl mx-auto px-6 text-center text-gray-500 text-sm">
            &copy; 2026 DAID - Built on Airia.ai for the Active Agents Hackathon.
        </div>
    </footer>
</body>
</html>
